<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Do'kon</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <header>
    <h1>🛍 Do'kon</h1>
    <button id="cart-btn" onclick="toggleCart()">
      🛒 <span id="cart-count">0</span>
    </button>
  </header>

  <!-- Tab navigatsiya -->
  <nav class="tabs">
    <button class="tab active" onclick="showTab('shop')">🏪 Mahsulotlar</button>
    <button class="tab" onclick="showTab('size')">📏 Size</button>
  </nav>

  <!-- Mahsulotlar bo'limi -->
  <section id="tab-shop">
    <div id="products-grid" class="grid">
      <p class="loading">⏳ Yuklanmoqda...</p>
    </div>
  </section>

  <!-- Size bo'limi -->
  <section id="tab-size" style="display:none">
    <div class="size-card">
      <h2>📏 Size Maslahat</h2>
      <label>Bo'y (sm)</label>
      <input type="number" id="height" placeholder="Masalan: 175" />
      <label>Vazn (kg)</label>
      <input type="number" id="weight" placeholder="Masalan: 70" />
      <button class="btn-primary" onclick="checkSize()">Aniqlash</button>
      <div id="size-result"></div>
    </div>
  </section>

  <!-- Savat panel -->
  <div id="cart-panel" class="cart-panel hidden">
    <div class="cart-header">
      <h2>🛒 Savat</h2>
      <button onclick="toggleCart()">✕</button>
    </div>
    <div id="cart-items"></div>
    <div class="cart-footer">
      <p>Jami: <strong id="total-price">0</strong> so'm</p>
      <button class="btn-order" onclick="placeOrder()">✅ Buyurtma berish</button>
    </div>
  </div>

  <div id="overlay" class="overlay hidden" onclick="toggleCart()"></div>

  <script src="app.js"></script>
</body>
</html>
